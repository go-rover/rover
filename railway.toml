# Config-as-code for Railway: dogfood & production deploy from this repo.
# Set secrets in Railway (WALLET_PRIVATE_KEY, GOROVER_SCOUT_KEY, RPC_URL, LLM_*, DRY_RUN).
# Config path = rover.config.example.ts; override nilai lewat env di applyRoverConfig.
# Docs: https://docs.railway.com/config-as-code/reference
#
# Build = Docker (lihat root Dockerfile). Bukan `Dockerfile.rover` di monorepo gorover — itu khusus gorover-app.
# Hapus RAILWAY_DOCKERFILE_PATH lama jika menunjuk ke file yang tidak ada di repo ini.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Harus selaras dengan CMD di Dockerfile (image tidak berisi `src/`, hanya `dist/`)
startCommand = "bun dist/cmd.js start rover.config.example.ts"
restartPolicyType = "ON_FAILURE"
